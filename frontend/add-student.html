<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Student - Smart Student Management System</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">Smart SMS</div>
        <div class="nav-links">
            <a href="dashboard.html">Dashboard</a>
            <a href="view-students.html">View Students</a>
            <a href="add-student.html" class="active">Add Student</a>
        </div>
        <div class="nav-user">
            <span class="text-muted">Welcome, Admin</span>
            <button onclick="logout()" class="btn btn-secondary btn-sm">Logout</button>
        </div>
    </nav>

    <div class="container">
        <div class="main-content">
            <h2>Add New Student</h2>
            <div id="studentAlert" class="alert"></div>
            
            <form id="addStudentForm" style="max-width: 600px; margin-top: 1.5rem;">
                <!-- Hidden input for Update scenario (reusing form if needed, though we can separate it) -->
                <input type="hidden" id="studentId" name="id">
                
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" name="name" required placeholder="e.g. John Doe">
                </div>
                
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                    <div class="form-group">
                        <label for="age">Age</label>
                        <input type="number" id="age" name="age" required min="10" max="100">
                    </div>
                    <div class="form-group">
                        <label for="gender">Gender</label>
                        <select id="gender" name="gender" required>
                            <option value="">Select Gender</option>
                            <option value="Male">Male</option>
                            <option value="Female">Female</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label for="course">Course</label>
                    <input type="text" id="course" name="course" required placeholder="e.g. Computer Science">
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                    <div class="form-group">
                        <label for="attendance">Attendance (%)</label>
                        <input type="number" id="attendance" name="attendance" required min="0" max="100" step="0.1">
                    </div>
                    <div class="form-group">
                        <label for="marks">Marks (%)</label>
                        <input type="number" id="marks" name="marks" required min="0" max="100" step="0.1">
                    </div>
                </div>

                <div style="margin-top: 1.5rem; display: flex; gap: 1rem;">
                    <button type="submit" class="btn btn-primary" id="submitBtn">Save Student</button>
                    <button type="button" class="btn btn-secondary" onclick="window.location.href='view-students.html'">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/script.js"></script>
    <script>
        checkAuth();
        
        // Check if we are editing an existing student
        const urlParams = new URLSearchParams(window.location.search);
        const editId = urlParams.get('edit');
        
        if (editId) {
            document.querySelector('h2').innerText = 'Update Student';
            document.getElementById('submitBtn').innerText = 'Update Student';
            
            // Fetch student data and populate form
            fetch('/api/students?id=' + editId)
                .then(res => res.json())
                .then(data => {
                    if(data.id) {
                        document.getElementById('studentId').value = data.id;
                        document.getElementById('name').value = data.name;
                        document.getElementById('age').value = data.age;
                        document.getElementById('gender').value = data.gender || '';
                        document.getElementById('course').value = data.course;
                        document.getElementById('attendance').value = data.attendance;
                        document.getElementById('marks').value = data.marks;
                    } else {
                        showAlert('studentAlert', 'error', 'Student not found.');
                    }
                })
                .catch(err => {
                    showAlert('studentAlert', 'error', 'Failed to load student data.');
                });
        }
    </script>
</body>
</html>
